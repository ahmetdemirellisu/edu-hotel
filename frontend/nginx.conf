server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Backend Yönlendirmesi
    # Loglarındaki POST /api/auth/login isteğini yakalar
    location /api/ {
        proxy_pass http://backend:3000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Statik Dosyalar (Performans için)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off; # Log kirliliğini önlemek için kapatılabilir
    }

    # 3. Frontend Uygulaması (SPA Ayarı)
    # React Router'ın (veya diğer client-side routerların) çalışması için kritik
    location / {
        try_files $uri $uri/ /index.html;
    }
}
