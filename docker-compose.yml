services:
  db:
    image: postgres:16-alpine
    container_name: eduhotel-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Named volume yerine dizin bazlı (Bind Mount) kullanım: 
      # Bu sayede veriler direkt kullanıcının home dizininde kalır.
      - ./postgres_data:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app-network

  backend:
    image: ghcr.io/ahmetdemirellisu/edu-hotel/backend:latest
    container_name: eduhotel-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      # İç ağda 'db' servis ismini kullanarak bağlanır
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-change-me-very-secret}
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_EXPIRES_IN: 7d
      # Frontend'in dışarıdan erişildiği URL
      CLIENT_URL: https://student-projects.sabanciuniv.edu/ehp
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9004:3000" # Dışarıdan 9002, içeride 3000
    networks:
      - app-network

  frontend:
    image: ghcr.io/ahmetdemirellisu/edu-hotel/frontend:latest
    container_name: eduhotel-frontend
    environment:
      # Frontend'in API'ye gitmesi gereken adres
      REACT_APP_API_URL: https://student-projects.sabanciuniv.edu/eduhotel-api
    depends_on:
      - backend
    ports:
      - "8004:80" # Dışarıdan 8002, içeride 80 (Nginx/Server portu)
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
